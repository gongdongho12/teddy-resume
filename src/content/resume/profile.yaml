          en:
            - Rapid Android/iOS hybrid delivery via Flutter for 2.0 launch (2025.03)
            - Architecture with tri-channel JSBridge, 20+ native bridge types, FCM stages, and ML Kit barcode integration
            - Automated MSA local development setup with Gradle local-yaml generation
