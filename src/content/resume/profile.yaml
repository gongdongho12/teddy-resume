projectSections:
  - heading:
      ko: 주요 프로젝트 — LGU+ VoltUp
      en: Projects — LGU+ VoltUp
    projects:
      - title:
          ko: 멀티 벤더 결제 시스템 및 정산 안정화
          en: Multi-vendor billing & settlement reliability
        portfolioSlug: multi-pg-payment
        period:
          ko: 2024.10 ~ 현재
          en: Oct 2024 — Present
        summary:
          ko: |
            결제 서비스를 초기 설계부터 주도하여 단일 결제에서 멀티 벤더사를 수용하는 모듈로 확장하고,
            다층 미수 관리 시스템을 구축하여 매출 정산의 정확도를 확보했습니다.
          en: |
            Led billing design from the start; expanded from a single payment flow into a modular structure that supports multiple payment vendors,
            and improved settlement accuracy through a layered arrears-management system.
        tech:
          - Kotlin
          - Spring Boot
          - Spring Batch
          - GCP Pub/Sub
          - Cloud SQL
        highlights:
          ko:
            - 결제 서비스를 프로젝트 초기 설계부터 구현까지 전담하며 핵심 개발자로 주도
            - 추상 클래스 기반 벤더 전략 패턴을 설계하여 카카오페이·토스페이먼츠·카카오T를 수용하는 멀티 벤더 결제 아키텍처 구축
            - GCP Pub/Sub 기반 DLQ(Dead-Letter Queue) 패턴 구현 — 커스텀 어노테이션 및 핸들러 자동 디스커버리로 결제 이벤트 유실 방지
            - DLQ 미수 처리 및 영구 미수 대상 처리 시스템 구축 — 재시도→DLQ, NACK 기반 자동 복구로 정산 누락 방지
          en:
            - Owned billing 0→1 as core engineer
            - Designed vendor strategy pattern with abstract base classes to integrate 3 PG providers with unified interface
            - GCP Pub/Sub DLQ pattern with custom annotation-based handler discovery for payment event resilience
            - DLQ-based arrears processing and permanent arrears handling system — retry→DLQ, NACK-based auto-recovery to prevent settlement gaps

      - title:
          ko: 통합 프로모션(쿠폰/포인트) 플랫폼 구축 및 고도화
          en: Coupon & point promotion platform buildout and enhancement
        portfolioSlug: promotion-platform
        period:
          ko: "쿠폰: 2025.07 / 포인트: 2025.08 ~ 현재"
          en: "Coupon: Jul 2025 / Points: Aug 2025 — Present"
        summary:
          ko: |
            다양한 제휴사(넥센, 도요타, 블루멤버스)의 프로모션 요구사항을 수용하는 범용 쿠폰·포인트 백엔드 시스템을
            구축했습니다.
          en: |
            Built a reusable coupon and points backend that supports partner-driven promotions such as Nexen, Toyota, and Bluemembers.
        tech:
          - Kotlin
          - Spring Boot
          - MySQL
          - JPA
        highlights:
          ko:
            - 적립 건마다 유효기간이 다른 포인트 지갑 시스템 설계 — 적립 시 별도 지갑 엔티티 생성, 잔액 합산 조회 및 만료 임박(7일) 포인트 별도 추적
            - 포인트 사용 시 무상 포인트 우선, 유효기간 임박순 차감 정책 구현 — 결제 취소 시에는 역순(유효기간 긴 지갑부터 환불)으로 사용자 유리하게 설계
            - Hold→Confirm→Release 3단계 포인트 차감 라이프사이클로 결제 실패 시 자동 복원 보장
            - 제휴사(넥센/도요타/블루멤버스) 쿠폰 만료일·중복발급·금액 설정 등 비즈니스 요구사항에 맞춘 유연한 프로모션 로직 개발
            - 프로모션 쿠폰 발급 배치 구상 및 개발
          en:
            - Designed point wallet system with per-deposit expiration — separate wallet entity per deposit, aggregated balance with 7-day expiry-soon tracking
            - "Point deduction policy: free points first, then earliest-expiring; cancellation refunds in reverse order (longest-expiry wallets first) to benefit users"
            - Hold→Confirm→Release 3-phase point lifecycle ensuring auto-restoration on payment failure
            - Partner-specific promo rules — expiry, duplicate issuance, amount settings (Nexen/Toyota/Bluemembers)
            - Promotion coupon issuance batch — designed and developed

