      - title:
          ko: 로밍 서비스 안정성 및 성능 최적화
          en: Roaming service reliability & performance
        period:
          ko: "2026.02"
          en: "Feb 2026"
        summary:
          ko: 타 충전사업자(환경부) 연동 로밍 서비스의 카드 상태 관리 로직을 재설계하고 처리 성능을 개선했습니다.
          en: Reworked roaming card-state updates using billing arrears truth; removed redundant serialization; batched billing lookups; tuned retries per domain.
        tech:
          - Kotlin
          - Spring Boot
          - GCP Pub/Sub
        highlights:
          ko:
            - 환경부 카드 상태 업데이트 로직을 결제 응답 기반에서 빌링 미수 이벤트 기반으로 재설계 — 미수 발생 건에 대해서만 선별적 상태 업데이트로 데이터 정확성 향상
            - 객체→문자열→객체 변환 비효율성 제거 및 빌링 개별 조회를 통합 조회로 변경하여 직렬화 오버헤드 절감
            - 환경부 에러 발생 시 재처리 프로세스 구성 — 회원카드 등 중요 데이터는 우선 재처리, 충전기 상태 등 누락 허용 가능한 항목은 후순위로 분리
          en:
            - Redesigned government card state updates from payment-response-based to billing arrears event-driven — selective updates only for arrears events
            - Eliminated object→string→object serialization overhead; consolidated individual billing queries into batch lookups
            - Government API error retry process — prioritized critical data (membership cards) over tolerably-lossy items (charger status)
        results:
          ko:
            - 카드 상태 업데이트 로직 재설계로 데이터 정확성 향상
            - 변환 오버헤드 제거 및 통합 조회로 처리 성능 개선
          en:
            - Improved data accuracy by rearchitecting card state update logic
            - Reduced processing overhead by eliminating serialization and consolidating billing queries

