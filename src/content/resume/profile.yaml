projectSections:
  - heading:
      ko: 주요 프로젝트 — LGU+ VoltUp
      en: Projects — LGU+ VoltUp
    projects:
      - title:
          ko: 멀티 PG 결제 시스템 및 정산 안정화
          en: Multi-PG billing & settlement reliability
        badge:
          ko: 기여율 76%
          en: ~76% of billing-service commits
        period:
          ko: 2024.10 ~ 현재
          en: Oct 2024 — Present
        summary:
          ko: |
            결제 서비스를 초기(0→1)부터 설계하여 단일 PG(카카오페이)에서 3개 PG사를 수용하는 멀티 모듈로 확장하고,
            다층 미수 관리 시스템을 구축하여 매출 정산의 정확도를 확보했습니다.
          en: |
            Led billing from scratch; expanded from a single PG to KakaoPay, Toss Payments, and Kakao T with
            shared error-code mapping. Layered arrears batches (1/7/30-day), retry→DLQ, and NACK recovery; SQL keepalive and pool tuning.
        tech:
          - Kotlin
          - Spring Boot
          - Spring Batch
          - GCP Pub/Sub
          - Cloud SQL
          - Flutter
        highlights:
          ko:
            - 결제 서비스를 프로젝트 초기(0→1)부터 설계·구현, 전체 커밋의 76%(490/646)를 직접 작성하며 핵심 개발자로 주도
            - 카카오페이 → 토스페이먼츠 → 카카오T 3개 PG사 통합 결제 아키텍처 설계 및 PG별 에러코드 매핑 체계 구축
            - 미수 처리 배치(1/7/30일 다단계), 5회 재시도→DLQ, NACK 기반 자동 복구 등 다층 미수 관리 시스템 구현
            - GCP Cloud SQL keepalive 설정 및 커넥션 풀 안정성 개선, 슬로우 쿼리 인덱싱
            - 카드 등록 제한(최대 10개), 중복 방지, vendor별/상태별 검색 필터 등 결제수단 관리 체계 구축
          en:
            - Owned billing 0→1 (~76% of commits in billing-service) as core engineer
            - Unified PG integration and error-code mapping across three providers
            - Multi-stage arrears batches, five retries to DLQ, NACK-based recovery
            - Cloud SQL keepalive & pool stability; slow-query indexing
            - Card registration limits, deduping, vendor/status filters

      - title:
          ko: 통합 마케팅(쿠폰/포인트) 플랫폼 구축
          en: Coupon & point marketing platform
        period:
          ko: "2025"
          en: "2025"
        summary:
          ko: |
            다양한 제휴사(넥센, 도요타, 블루멤버스)의 프로모션 요구사항을 수용하는 범용 쿠폰·포인트 백엔드 시스템을
            구축하고, 어드민 관리 UI까지 풀스택으로 구현했습니다.
          en: |
            Backend for coupons/points covering Nexen/Toyota/Bluemembers-style promos; full-stack admin UI.
        tech:
          - Kotlin
          - Spring Boot
          - MySQL
          - JPA
          - React
          - Ant Design
        highlights:
          ko:
            - 포인트 지갑 조회/조절/취소 API 및 어드민 관리 UI를 백엔드~프론트엔드까지 풀스택으로 구현
            - 제휴사(넥센) 쿠폰 만료일·중복발급·금액 설정 등 비즈니스 요구사항에 맞춘 유연한 프로모션 로직 개발
            - 포인트 재결제 시 사용 누락 버그를 발견·수정하여 정산 정확도 확보
            - 카카오T 프로모션 쿠폰 대상자 확인 API 구현
          en:
            - Wallet APIs and admin UI end-to-end
            - Partner-specific expiry, duplicate issuance, and amount rules (e.g., Nexen)
            - Fixed missing point usage on re-payment to protect settlement accuracy
            - Kakao T promotion eligibility API

      - title:
          ko: VoltUp 하이브리드 앱 및 유저 사이드 백엔드
          en: VoltUp hybrid app & user-side backend
        period:
          ko: "2025"
          en: "2025"
        summary:
          ko: |
            서비스 2.0 런칭을 위해 Flutter 하이브리드 앱 개발을 주도하고,
            카카오T 계정/결제 연동(4개 MSA 관통), PnC 자동충전, 미결제 감시 등 유저 사이드 백엔드 전반을 개발했습니다.
          en: |
            Led Flutter hybrid delivery for 2.0; Kakao T account/payment across auth, user, billing, feapp;
            PnC auto-charge; unpaid-charge Slack watchdogs; Gradle local-yaml generator and Flyway.
        tech:
          - Flutter
          - Kotlin
          - Spring Boot
          - GCP Pub/Sub
          - Flyway
        highlights:
          ko:
            - 카카오T 계정/결제 연동을 auth → user → billing → feapp 4개 MSA 서비스에 걸쳐 직접 설계·구현
            - PnC(Plug and Charge) 자동충전 시스템의 EVCC ID 인증 로직 설계 및 구현
            - 빌링 미반영 충전 주문을 자동 탐지하여 Slack 알림하는 감시 배치 구축
            - 미수 알림톡 발송 조건 최적화(첫 이벤트만 발송)로 사용자 알림 피로도 감소
            - MSA 로컬 개발 환경 구성 자동화(Gradle local-yaml 생성) 및 Flyway DB 마이그레이션 적용
            - 서비스 개발 가능 범위 산정(PoC) 및 Android/iOS 하이브리드 앱 신속 개발 및 런칭(2025.03)
            - Flutter 하이브리드 앱 아키텍처·JSBridge 3채널, 20+ 네이티브 브릿지 타입, FCM 3단계 푸시, ML Kit 바코드 등 (상세)
          en:
            - Kakao T auth/payment spanning four MSA services
            - EVCC ID auth for Plug & Charge
            - Slack jobs for billing mismatches; tuned arrears notification cadence
            - Gradle tooling for local YAML; Flyway migrations
            - Hybrid app architecture with tri-channel JSBridge, native bridges, FCM stages, ML Kit barcode, secure storage
        results:
          ko:
            - 5개월 만에 PoC → 런칭 (82파일, 621커밋 규모 참고)
            - 웹팀이 JS API로 네이티브 기능 호출 가능한 브릿지 패턴 확립
          en:
            - PoC→launch in ~5 months; established bridge pattern for web-to-native APIs

      - title:
          ko: 로밍 서비스 안정성 및 성능 최적화
          en: Roaming service reliability & performance
        period:
          ko: "2025"
          en: "2025"
        summary:
          ko: 타 충전사업자(환경부) 연동 로밍 서비스의 카드 상태 관리 로직을 재설계하고 처리 성능을 개선했습니다.
          en: Reworked roaming card-state updates using billing arrears truth; removed redundant serialization; batched billing lookups; tuned retries per domain.
        tech:
          - Kotlin
          - Spring Boot
          - GCP Pub/Sub
        highlights:
          ko:
            - 카드 상태 업데이트 로직을 결제 응답 기반에서 실제 빌링 미수정보 기반으로 재설계하여 데이터 정확성 향상
            - 불필요한 직렬화/역직렬화 제거 및 빌링 개별 조회 통합으로 처리 성능 개선
            - 에러 시 리트라이 횟수를 서비스별 차등 조정 (충전기/회원카드 2회, 주문 3회)
          en:
            - Card state driven by billing arrears instead of payment responses only
            - Fewer serialize round-trips; consolidated billing queries
            - Differentiated retry counts (charger/card vs order)

