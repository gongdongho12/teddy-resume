        summary:
          ko: 개인적으로 여행 계획과 이동 동선을 공유하고, 여행 루트 초안을 빠르게 잡기 위해 만든 지도 기반 여행 계획 서비스
          en: A map-based travel planning service built to share my travel plans and quickly draft route ideas.
        tech:
          - Astro
          - React
          - TypeScript
          - Leaflet
          - Markdown
          - GitHub Pages
        highlights:
          ko:
            - 여행 일정과 이동 경로를 지도와 타임라인으로 함께 볼 수 있는 개인 서비스로 구성
            - 여행지와 이동 루트를 자연어로 입력하면 AI 워크플로우가 일정 초안과 장소 구성을 잡아주고, 이후 Markdown으로 세부 계획을 직접 고도화할 수 있는 플로우 구성
            - Markdown 기반 여행 데이터를 관리해 여행별 콘텐츠를 손쉽게 추가·운영하고, 정적 배포로 링크 하나만으로 여행 계획을 공유할 수 있게 운영
          en:
            - Built as a personal service that shows travel plans and routes together on a map and timeline
            - Added an AI workflow that turns natural-language destinations and routes into a rough itinerary draft, which can then be refined directly in Markdown
            - Manages trip content through Markdown-based travel data and static deployment so a single link can be used to share plans easily
