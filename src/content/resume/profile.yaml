          en:
            - PoC→launch in ~5 months; established consistent bridge pattern for web-to-native APIs

      - title:
          ko: 로밍 서비스 안정성 및 성능 최적화
          en: Roaming service reliability & performance
        period:
          ko: "2025"
          en: "2025"
        summary:
          ko: 타 충전사업자(환경부) 연동 로밍 서비스의 카드 상태 관리 로직을 재설계하고 처리 성능을 개선했습니다.
          en: Reworked roaming card-state updates using billing arrears truth; removed redundant serialization; batched billing lookups; tuned retries per domain.
        tech:
          - Kotlin
          - Spring Boot
          - GCP Pub/Sub
        highlights:
